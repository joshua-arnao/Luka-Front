<div class="register-wrapper">
  <div class="register-card">
    <div class="logo">
      <span class="logo-icon">₿</span>
      <span class="logo-text">LUKA</span>
    </div>

    <h1>Crea tu cuenta</h1>
    <p class="subtitle">Tu billetera digital te espera</p>

    <div class="error-msg" *ngIf="error">{{ error }}</div>
    <div class="success-msg" *ngIf="success">{{ success }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input
            type="text"
            [(ngModel)]="request.firstName"
            name="firstName"
            placeholder="Joshua"
            required
          />
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input
            type="text"
            [(ngModel)]="request.lastName"
            name="lastName"
            placeholder="Arnao"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label>DNI</label>
        <input
          type="text"
          [(ngModel)]="request.dni"
          name="dni"
          placeholder="12345678"
          required
        />
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input
          type="email"
          [(ngModel)]="request.email"
          name="email"
          placeholder="tu@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input
          type="text"
          [(ngModel)]="request.phoneNumber"
          name="phoneNumber"
          placeholder="999888777"
          required
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          [(ngModel)]="request.password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? "Creando cuenta..." : "Crear cuenta" }}
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
